[build]
  publish = "."

# Migration redirects are intentionally maintained in `/_redirects`
# for this static Netlify publish. Keep the large 301 map there so
# deploy behavior stays predictable across preview and production.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"

# Contact form backend: Netlify Forms detects the contact form in /contact/.
# Verify notification routing in the Netlify site settings during staging QA.
